<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homeboard Control Center</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='manage.css') }}">
</head>
<body>

<div class="container">

    <header>
        <h1>⚙ Homeboard</h1>
        <p>Control Center</p>
    </header>

    <main class="cards">

        <a href="/calendar" class="card">
            <div class="icon">📅</div>
            <h2>Calendar</h2>
            <p>Manage events</p>
        </a>

        <a href="/tasks" class="card">
            <div class="icon">✅</div>
            <h2>Tasks</h2>
            <p>Manage household tasks</p>
        </a>

        <a href="/shopping" class="card">
            <div class="icon">🛒</div>
            <h2>Shopping</h2>
            <p>Manage grocery list</p>
        </a>

    </main>

</div>

</body>
</html>
